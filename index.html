<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#102033">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Study 2026">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>テスト勉強 2026前期</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<style>
:root{
  --c-bg:#f6f7f9; --c-card:#ffffff; --c-text:#1e2430; --c-sub:#6b7280;
  --c-accent:#2563eb; --c-accent-soft:#dbeafe; --c-line:#d1d5db;
  --c-fill1:#dbeafe; --c-fill2:#fef3c7; --c-ok:#16a34a; --c-ng:#dc2626;
  --c-warn:#d97706; --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.05);
}
@media (prefers-color-scheme: dark){
  :root{
    --c-bg:#12151c; --c-card:#1c212b; --c-text:#e7eaf0; --c-sub:#9aa3b2;
    --c-accent:#60a5fa; --c-accent-soft:#1e3a5f; --c-line:#374151;
    --c-fill1:#1e3a5f; --c-fill2:#4a3a12; --shadow:0 1px 3px rgba(0,0,0,.4);
  }
}
*{box-sizing:border-box;margin:0}
body{font-family:"Hiragino Sans","Yu Gothic UI","Noto Sans JP",sans-serif;background:var(--c-bg);color:var(--c-text);line-height:1.75;padding-bottom:60px}
#app{max-width:860px;margin:0 auto;padding:16px}
a{color:var(--c-accent);text-decoration:none}
.card{background:var(--c-card);border-radius:14px;padding:18px;margin:12px 0;box-shadow:var(--shadow)}
.topbar{display:flex;align-items:center;gap:10px;padding:8px 0;flex-wrap:wrap}
.topbar h1{font-size:1.15rem}
.crumb{font-size:.85rem;color:var(--c-sub)}
button{font-family:inherit;font-size:.92rem;border:none;border-radius:10px;padding:9px 16px;cursor:pointer;background:var(--c-accent-soft);color:var(--c-text)}
button.primary{background:var(--c-accent);color:#fff}
button.ghost{background:transparent;border:1px solid var(--c-line)}
button:active{transform:scale(.97)}
.bar{height:8px;border-radius:4px;background:var(--c-line);overflow:hidden;margin:6px 0}
.bar>div{height:100%;background:var(--c-accent);transition:width .3s}
.tag{display:inline-block;font-size:.72rem;padding:2px 9px;border-radius:99px;background:var(--c-accent-soft);margin-right:6px}
.tag.p3{background:#fecaca;color:#7f1d1d}.tag.p2{background:var(--c-fill2);color:#7c4a03}
@media (prefers-color-scheme: dark){.tag.p3{background:#5f1e1e;color:#fca5a5}.tag.p2{background:#4a3a12;color:#fcd34d}}
.subcard{cursor:pointer;transition:transform .12s}
.subcard:hover{transform:translateY(-2px)}
.subcard h2{font-size:1.05rem;margin-bottom:2px}
.meta{font-size:.8rem;color:var(--c-sub)}
.tabs{display:flex;gap:6px;overflow-x:auto;padding:4px 0;position:sticky;top:0;background:var(--c-bg);z-index:5}
.tabs button{white-space:nowrap;font-size:.85rem;padding:8px 14px}
.tabs button.on{background:var(--c-accent);color:#fff}
.gl{border-bottom:2px dotted var(--c-accent);cursor:pointer;font-weight:600}
.section-body p{margin:.5em 0}
.section-body table{border-collapse:collapse;margin:.5em 0;font-size:.9rem}
.section-body td,.section-body th{border:1px solid var(--c-line);padding:4px 10px}
.svgwrap{margin:12px auto;text-align:center}
.svgwrap svg{max-width:100%;height:auto}
.fcard{border:1px solid var(--c-line);border-radius:12px;padding:14px;margin:10px 0}
.fcard .fname{font-weight:700;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.flatex{padding:14px 6px;text-align:center;font-size:1.12rem;overflow-x:auto}
.vars{font-size:.85rem;border-collapse:collapse;width:100%}
.vars td{border-top:1px solid var(--c-line);padding:4px 8px}
.whenbox{background:var(--c-accent-soft);border-radius:8px;padding:8px 12px;font-size:.87rem;margin:8px 0}
.stage{font-size:.72rem;padding:2px 8px;border-radius:99px;background:var(--c-line)}
.stage.s1{background:var(--c-fill2)}.stage.s2{background:var(--c-accent-soft)}.stage.s3{background:var(--c-ok);color:#fff}
.choice{display:block;width:100%;text-align:left;margin:6px 0;background:var(--c-card);border:1.5px solid var(--c-line);border-radius:10px;padding:11px 14px}
.choice.ok{border-color:var(--c-ok);background:color-mix(in srgb,var(--c-ok) 12%,var(--c-card))}
.choice.ng{border-color:var(--c-ng);background:color-mix(in srgb,var(--c-ng) 12%,var(--c-card))}
.expl{background:var(--c-accent-soft);border-radius:10px;padding:10px 14px;margin-top:8px;font-size:.9rem}
.stepbox{border-left:3px solid var(--c-accent);padding:8px 14px;margin:8px 0;background:var(--c-card);border-radius:0 10px 10px 0;box-shadow:var(--shadow)}
.stepbox .slabel{font-weight:700;font-size:.85rem;color:var(--c-accent)}
.qtext{font-weight:600;margin-bottom:8px}
.rowbtns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.popup{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:50}
.popup .inner{background:var(--c-card);border-radius:18px 18px 0 0;padding:22px;max-width:640px;width:100%;max-height:70vh;overflow-y:auto}
.popup h3{margin-bottom:6px}
.mini{font-size:.8rem;color:var(--c-sub)}
.statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin:10px 0}
.statgrid .st{background:var(--c-bg);border-radius:10px;padding:10px;text-align:center}
.st b{font-size:1.3rem}
.sheet-f{border-bottom:1px solid var(--c-line);padding:10px 0}
.weak{color:var(--c-ng);font-weight:700}
.katex-display{overflow-x:auto;overflow-y:hidden;padding:4px 0}
.notice{font-size:.85rem;color:var(--c-sub);text-align:center;padding:20px}

input,select,textarea{font-family:inherit;font-size:.92rem;color:var(--c-text);background:var(--c-card);border:1px solid var(--c-line);border-radius:10px;padding:8px 10px}
textarea{width:100%;min-height:74px;resize:vertical;margin-top:8px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:8px 0}
.spacer{flex:1}
.examline{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:8px}
.examline input{max-width:150px}
.dategrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:8px}
.date-row{display:flex;align-items:center;justify-content:space-between;gap:10px;border:1px solid var(--c-line);border-radius:10px;padding:10px}
.date-row input{width:145px}
.todo-list{display:grid;gap:8px;margin-top:10px}
.task{display:flex;align-items:center;justify-content:space-between;gap:10px;border:1px solid var(--c-line);border-radius:10px;padding:10px;background:var(--c-card)}
.task-main{min-width:0}
.task-title{font-weight:700}
.task-sub{font-size:.8rem;color:var(--c-sub)}
.task button{flex-shrink:0}
.calendar{display:grid;gap:10px;margin-top:10px}
.daycard{border:1px solid var(--c-line);border-radius:12px;padding:12px;background:var(--c-card)}
.dayhead{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--c-line);padding-bottom:6px;margin-bottom:8px}
.planitem{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:7px 0;border-bottom:1px dashed var(--c-line)}
.planitem:last-child{border-bottom:none}
.searchbox{width:100%;font-size:1rem;margin:8px 0}
.result{border-bottom:1px solid var(--c-line);padding:10px 0}
.mistake{border-left:3px solid var(--c-warn);padding:10px 12px;margin:8px 0;background:var(--c-card);border-radius:0 10px 10px 0;box-shadow:var(--shadow)}
.diffbox,.hintbox{background:var(--c-bg);border:1px solid var(--c-line);border-radius:10px;padding:10px 12px;margin-top:8px;font-size:.88rem}
.filterbar{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
.filterbar button.on{background:var(--c-accent);color:#fff}
.levelbar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin:10px 0}
.levelbar button{padding:7px 12px;font-size:.84rem}
.levelbar button.on{background:var(--c-accent);color:#fff}
.level-badge{display:inline-flex;align-items:center;gap:4px;font-size:.72rem;font-weight:800;border-radius:99px;padding:3px 9px}
.level-badge.basic{background:var(--c-accent-soft);color:var(--c-accent)}
.level-badge.standard{background:var(--c-fill2);color:#7c4a03}
.level-badge.advanced{background:#fee2e2;color:#991b1b}
.problem-head{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;align-items:flex-start}
.problem-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.problem-note{display:grid;gap:6px;margin-top:8px}
.problem-note .mini{background:var(--c-bg);border:1px solid var(--c-line);border-radius:8px;padding:7px 9px}
.concept-grid{display:grid;gap:12px;margin-top:10px}
.concept-card{border:1px solid var(--c-line);border-radius:14px;padding:14px;background:var(--c-card)}
.concept-title{display:flex;justify-content:space-between;gap:8px;align-items:flex-start;flex-wrap:wrap;margin-bottom:8px}
.lab-layout{display:grid;grid-template-columns:minmax(220px,280px) 1fr;gap:12px;align-items:start}
.lab-controls{display:grid;gap:8px}
.lab-control span{display:flex;justify-content:space-between;gap:8px;font-size:.8rem;color:var(--c-sub);margin-bottom:3px}
.lab-control input[type="range"]{width:100%;padding:0}
.lab-output{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:8px;margin-top:8px}
.lab-output div{border:1px solid var(--c-line);border-radius:10px;background:var(--c-bg);padding:8px}
.lab-output b{display:block;font-size:1.05rem}
.lab-svg{border:1px solid var(--c-line);border-radius:12px;background:var(--c-bg);overflow:hidden}
.lab-svg svg{display:block;width:100%;height:auto}
.lab-equation{font-size:.86rem;background:var(--c-accent-soft);border-radius:10px;padding:9px 11px;margin-top:8px}
@media (prefers-color-scheme: dark){.level-badge.advanced{background:#5f1e1e;color:#fca5a5}.level-badge.standard{background:#4a3a12;color:#fcd34d}}
@media (max-width:760px){.lab-layout{grid-template-columns:1fr}.problem-head{flex-direction:column}}

.simgrid{display:grid;grid-template-columns:minmax(230px,300px) 1fr;gap:12px;align-items:start}
.simcontrols{position:sticky;top:52px}
.simctrl{display:block;margin:10px 0}
.simctrl>span{display:block;font-size:.82rem;color:var(--c-sub);margin-bottom:4px}
.ctrlrow{display:grid;grid-template-columns:1fr 82px 42px;gap:7px;align-items:center}
.ctrlrow input[type="range"]{padding:0}
.ctrlrow em{font-style:normal;font-size:.78rem;color:var(--c-sub)}
.selectrow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.svgpanel{border:1px solid var(--c-line);border-radius:12px;padding:10px;background:var(--c-bg);margin-top:10px;overflow:hidden}
.svgpanel svg{width:100%;height:auto;display:block}
.metricgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:8px;margin-top:10px}
.metric{border:1px solid var(--c-line);border-radius:10px;padding:9px;background:var(--c-card)}
.metric b{display:block;font-size:1.05rem}
.diagram-title{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}
.diagram-title b{font-size:.95rem}
.beam-readout{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.beam-readout .tag{margin-right:0}
.beamnote{font-size:.8rem;color:var(--c-sub);margin-top:8px}
.beamsvg{cursor:crosshair}

.beamtools{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px;margin:8px 0}
.beamtools button{padding:8px 10px}
.beamtools button.on{background:var(--c-accent);color:#fff}
.itemlist{display:grid;gap:8px;margin-top:10px}
.itemrow{border:1px solid var(--c-line);border-radius:10px;padding:9px;background:var(--c-bg)}
.itemrow-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}
.itemkind{font-weight:700;font-size:.9rem}
.itemgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px}
.itemgrid label span{display:block;font-size:.72rem;color:var(--c-sub);margin-bottom:2px}
.itemgrid input{width:100%}
.warnbox{border:1px solid var(--c-warn);background:color-mix(in srgb,var(--c-warn) 12%,var(--c-card));border-radius:10px;padding:9px 11px;margin-top:8px;font-size:.84rem}
@media (max-width:760px){
  .beamtools{grid-template-columns:1fr}
  .itemgrid{grid-template-columns:1fr}
}
@media (max-width:760px){
  .simgrid{grid-template-columns:1fr}
  .simcontrols{position:static}
  .ctrlrow{grid-template-columns:1fr 76px 36px}
}

.empty{border:1px dashed var(--c-line);border-radius:12px;padding:14px;text-align:center;color:var(--c-sub)}
@media (max-width:640px){
  #app{padding:12px}
  .task,.planitem,.date-row{align-items:stretch;flex-direction:column}
  .task button,.planitem button{width:100%}
}


/* --- design refresh 2026 --- */
:root{
  --c-bg:#f4f7fb;
  --c-card:rgba(255,255,255,.88);
  --c-card-solid:#ffffff;
  --c-text:#172033;
  --c-sub:#687385;
  --c-accent:#2563eb;
  --c-accent-soft:#e7eefc;
  --c-line:#d9e0ea;
  --c-fill1:#dbeafe;
  --c-fill2:#fff1bf;
  --c-ok:#15803d;
  --c-ng:#dc2626;
  --c-warn:#b45309;
  --c-ink:#101828;
  --radius:8px;
  --shadow:0 1px 1px rgba(16,24,40,.04),0 10px 30px rgba(16,24,40,.08);
  --shadow-hover:0 2px 4px rgba(16,24,40,.06),0 16px 42px rgba(16,24,40,.12);
}
@media (prefers-color-scheme: dark){
  :root{
    --c-bg:#10141b;
    --c-card:rgba(25,31,42,.9);
    --c-card-solid:#1b2230;
    --c-text:#edf2f8;
    --c-sub:#9ca8ba;
    --c-accent:#7db2ff;
    --c-accent-soft:#172b48;
    --c-line:#303b4e;
    --c-fill1:#172b48;
    --c-fill2:#3e3316;
    --c-ink:#f5f7fb;
    --shadow:0 1px 1px rgba(0,0,0,.28),0 12px 36px rgba(0,0,0,.28);
    --shadow-hover:0 2px 4px rgba(0,0,0,.32),0 18px 48px rgba(0,0,0,.34);
  }
}
body{
  min-height:100vh;
  overflow-x:hidden;
  background:
    linear-gradient(135deg, rgba(37,99,235,.08), transparent 34%),
    linear-gradient(235deg, rgba(21,128,61,.07), transparent 38%),
    var(--c-bg);
  letter-spacing:0;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background-image:
    linear-gradient(rgba(23,32,51,.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(23,32,51,.045) 1px, transparent 1px);
  background-size:32px 32px;
  mask-image:linear-gradient(to bottom, rgba(0,0,0,.62), transparent 82%);
}
#app{
  max-width:1120px;
  padding:18px 20px 72px;
  position:relative;
}
.card{
  border-radius:var(--radius);
  border:1px solid color-mix(in srgb,var(--c-line) 86%,transparent);
  background:var(--c-card);
  box-shadow:var(--shadow);
  backdrop-filter:blur(14px);
}
.topbar.appbar{
  position:sticky;
  top:0;
  z-index:12;
  margin:-18px -20px 14px;
  padding:12px 20px;
  background:color-mix(in srgb,var(--c-bg) 82%,transparent);
  border-bottom:1px solid color-mix(in srgb,var(--c-line) 78%,transparent);
  backdrop-filter:blur(16px);
}
.topbar h1{font-size:1.05rem;letter-spacing:0;font-weight:800}
button{
  border-radius:var(--radius);
  border:1px solid transparent;
  font-weight:700;
  transition:transform .12s ease,box-shadow .12s ease,background .12s ease,border-color .12s ease;
}
button:hover{box-shadow:0 6px 16px rgba(16,24,40,.09)}
button.ghost{background:color-mix(in srgb,var(--c-card-solid) 74%,transparent)}
input,select,textarea{border-radius:var(--radius);background:var(--c-card-solid)}
.hero-panel{
  display:grid;
  grid-template-columns:minmax(0,1.25fr) minmax(300px,.75fr);
  gap:18px;
  align-items:stretch;
  margin:10px 0 16px;
  padding:22px;
  color:#f8fbff;
  border-radius:var(--radius);
  background:
    linear-gradient(140deg, rgba(15,23,42,.96), rgba(30,64,110,.95) 54%, rgba(12,95,99,.92));
  box-shadow:0 18px 52px rgba(15,23,42,.22);
  overflow:hidden;
  position:relative;
}
.hero-panel::after{
  content:"";
  position:absolute;
  inset:auto 0 -34px auto;
  width:min(360px,58%);
  height:170px;
  background:
    linear-gradient(90deg, transparent 0 9%, rgba(255,255,255,.16) 9% 10%, transparent 10% 20%),
    linear-gradient(rgba(255,255,255,.13) 1px, transparent 1px);
  background-size:46px 46px,46px 46px;
  transform:rotate(-8deg);
  opacity:.55;
}
.hero-panel>*{position:relative;z-index:1}
.eyebrow{
  font-size:.72rem;
  font-weight:800;
  color:#a7f3d0;
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:4px;
}
.hero-panel h1{font-size:clamp(1.55rem,2.6vw,2.3rem);line-height:1.22;letter-spacing:0;margin:0 0 8px}
.hero-panel p{max-width:50rem;color:rgba(248,251,255,.78);font-size:.94rem}
.hero-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.hero-actions button{background:rgba(255,255,255,.13);color:#fff;border-color:rgba(255,255,255,.2)}
.hero-actions button.primary{background:#f8fbff;color:#102033}
.hero-metrics{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:8px;
  align-self:end;
}
.hero-metric{
  min-width:0;
  border:1px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.1);
  border-radius:var(--radius);
  padding:10px;
}
.hero-metric b{display:block;font-size:1.35rem;line-height:1.1}
.hero-metric span{display:block;color:rgba(248,251,255,.7);font-size:.75rem;margin-top:4px}
.dash-layout{
  display:grid;
  grid-template-columns:minmax(0,1fr) 310px;
  gap:12px;
  align-items:start;
  margin-bottom:12px;
}
.task-panel,.quick-panel{margin:0}
.panel-title,.section-title{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:10px;
}
.panel-title b,.section-title b{font-size:.98rem}
.section-title{margin:18px 2px 10px}
.section-title .mini{text-align:right}
.quick-links{display:grid;gap:8px;margin-top:10px}
.quick-links button{width:100%;text-align:left;background:var(--c-card-solid);border-color:var(--c-line)}
.subject-grid,.unit-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(255px,1fr));
  gap:12px;
}
.subject-card,.unit-card{margin:0;position:relative;overflow:hidden}
.subject-card::before,.unit-card::before{
  content:"";
  position:absolute;
  left:0;
  top:0;
  bottom:0;
  width:4px;
  background:var(--subject-accent,var(--c-accent));
}
.subject-card:hover,.unit-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover)}
.subcard-head{
  display:flex;
  align-items:flex-start;
  gap:12px;
  margin-bottom:10px;
}
.subject-mark{
  width:46px;
  height:46px;
  flex:0 0 auto;
  border-radius:var(--radius);
  display:grid;
  place-items:center;
  color:#fff;
  font-weight:900;
  font-size:.82rem;
  letter-spacing:0;
  background:
    linear-gradient(135deg, color-mix(in srgb,var(--subject-accent,var(--c-accent)) 86%,#111827), var(--subject-accent,var(--c-accent))),
    linear-gradient(90deg, rgba(255,255,255,.18) 1px, transparent 1px);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.22),0 10px 24px color-mix(in srgb,var(--subject-accent,var(--c-accent)) 18%,transparent);
}
.subject-card h2{font-size:1rem;line-height:1.35;margin:0}
.subject-foot,.unit-foot{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-top:8px;
}
.bar{
  height:7px;
  background:color-mix(in srgb,var(--subject-soft,var(--c-accent-soft)) 70%,var(--c-line));
}

<div id="app"></div>

<!-- 科目データ -->
<script src="subjects/doshitsu1.js"></script>
<script src="subjects/doshitsu3.js"></script>
<script src="subjects/kozo1.js"></script>
<script src="subjects/kozo2.js"></script>
<script src="subjects/kozo3.js"></script>
<script src="subjects/suiri1.js"></script>
<script src="subjects/suiri3.js"></script>
<script src="subjects/oyosugaku1.js"></script>
<script src="subjects/keikaku2.js"></script>
<script src="subjects/challenge-pack.js"></script>
<script src="./sync.config.js"></script>

<script>
"use strict";
const DATA = window.STUDY_DATA || {};
const ORDER = ["doshitsu1","doshitsu3","kozo1","kozo2","kozo3","suiri1","suiri3","oyosugaku1","keikaku2"];
const $ = s => document.querySelector(s);
const app = $("#app");

/* ---------- state ---------- */
const KEY = "studyapp-v1";
const DB_NAME = "studyapp-state";
const DB_VERSION = 1;
const DB_STORE = "kv";
const DB_STATE_KEY = "state";
const APP_VERSION = "2026.07.07-hosted";
const SYNC_CONFIG = window.STUDY_SYNC_CONFIG || {};
let dbPromise = null;
let saveTimer = 0;
let storageStatus = {ready:false, idb:false, persisted:false, mode:"localStorage", lastSaved:"", error:"", sw:"未確認"};
let syncStatus = {configured:false, ready:false, signedIn:false, email:"", uid:"", mode:"未設定", lastPulled:"", lastPushed:"", remoteUpdatedAt:"", error:""};
let syncFb = null;
let syncAuth = null;
let syncDb = null;
let syncUnsub = null;
let syncInitPromise = null;
let syncSaveTimer = 0;
let syncPause = false;

function nowIso(){ return new Date().toISOString(); }
function parseJSONSafe(raw){ try{ return raw ? JSON.parse(raw) : {}; }catch(e){ return {}; } }
function readLocalState(){
  try{ return parseJSONSafe(localStorage.getItem(KEY)); }catch(e){ return {}; }
}
let S = readLocalState();

function ensureMeta(){
  if(!S._meta || typeof S._meta !== "object" || Array.isArray(S._meta)) S._meta = {dates:{}, sheetFilter:"all", sheetFilters:{}, search:""};
  S._meta.dates = S._meta.dates || {};
  S._meta.sheetFilters = S._meta.sheetFilters || {};
  if(typeof S._meta.sheetFilter === "string" && !Object.keys(S._meta.sheetFilters).length) S._meta.sheetFilters._legacy = S._meta.sheetFilter;
  S._meta.search = S._meta.search || "";
  S._meta.appVersion = APP_VERSION;
  return S._meta;
}
function meta(){ return ensureMeta(); }
function stateUpdatedAt(o){ return Date.parse(o?._meta?.updatedAt || "") || 0; }
function cloneState(){ return JSON.parse(JSON.stringify(S)); }
function stateBytes(o=S){ try{ return new Blob([JSON.stringify(o)]).size; }catch(e){ return JSON.stringify(o).length; } }
function save(options={}){
  const m = meta();
  if(!options.keepUpdatedAt) m.updatedAt = nowIso();
  m.saveCount = Number(m.saveCount||0) + 1;
  storageStatus.lastSaved = m.updatedAt;
  try{
    localStorage.setItem(KEY, JSON.stringify(S));
    storageStatus.mode = storageStatus.idb ? "IndexedDB + localStorage" : "localStorage";
  }catch(e){
    storageStatus.error = "localStorage保存失敗: " + (e?.message || e);
  }
  queueIdbSave();
  if(!options.skipCloud) queueCloudSave();
}
function openDb(){
  if(typeof indexedDB === "undefined") return Promise.reject(new Error("IndexedDB非対応"));
  if(dbPromise) return dbPromise;
  dbPromise = new Promise((resolve,reject)=>{
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = () => {
      const db = req.result;
      if(!db.objectStoreNames.contains(DB_STORE)) db.createObjectStore(DB_STORE,{keyPath:"key"});
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error || new Error("IndexedDBを開けません"));
  });
  return dbPromise;
}
async function idbGet(key){
  const db = await openDb();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction(DB_STORE,"readonly");
    const req=tx.objectStore(DB_STORE).get(key);
    req.onsuccess=()=>resolve(req.result?.value);
    req.onerror=()=>reject(req.error);
  });
}
async function idbSet(key,value){
  const db = await openDb();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction(DB_STORE,"readwrite");
    tx.objectStore(DB_STORE).put({key,value,updatedAt:nowIso()});
    tx.oncomplete=()=>resolve();
    tx.onerror=()=>reject(tx.error);
  });
}
function queueIdbSave(){
  if(typeof indexedDB === "undefined") return;
  clearTimeout(saveTimer);
  const snapshot = cloneState();
  saveTimer = setTimeout(async()=>{
    try{
      await idbSet(DB_STATE_KEY, snapshot);
      storageStatus.idb = true;
      storageStatus.mode = "IndexedDB + localStorage";
    }catch(e){
      storageStatus.error = "IndexedDB保存失敗: " + (e?.message || e);
    }
  },120);
}
async function hydrateState(){
  try{
    const m = meta();
    storageStatus.lastSaved = m.updatedAt || "";
    if(typeof navigator !== "undefined" && navigator.storage?.persisted){
      storageStatus.persisted = await navigator.storage.persisted();
    }
    if(typeof indexedDB !== "undefined"){
      const dbState = await idbGet(DB_STATE_KEY);
      storageStatus.idb = true;
      if(dbState && stateUpdatedAt(dbState) > stateUpdatedAt(S)){
        S = dbState;
        storageStatus.mode = "IndexedDB";
      }
    }
  }catch(e){
    storageStatus.error = e?.message || String(e);
  }finally{
    storageStatus.ready = true;
    if(!meta().updatedAt) save(); else queueIdbSave();
    render();
  }
}
function st(subj){
  if(!S[subj]) S[subj] = {read:{},fmem:{},fsel:{},fsolve:{},selq:{},quiz:{},prob:{},miss:{formula:0,calc:0},pick:{},mistakes:[],rev:{}};
  const o=S[subj];
  o.read=o.read||{}; o.fmem=o.fmem||{}; o.fsel=o.fsel||{}; o.fsolve=o.fsolve||{};
  o.selq=o.selq||{}; o.quiz=o.quiz||{}; o.prob=o.prob||{};
  o.miss=o.miss||{formula:0,calc:0}; o.pick=o.pick||{}; o.rev=o.rev||{};
  if(!Array.isArray(o.mistakes)) o.mistakes=[];
  return o;
}

/* ---------- helpers ---------- */
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function tex(latex, disp){
  if(window.katex){ try{ return katex.renderToString(latex,{displayMode:!!disp,throwOnError:false}); }catch(e){} }
  return "<code>"+esc(latex)+"</code>";
}
function md(html, subj){
  let s = String(html);
  s = s.replace(/\$\$([\s\S]+?)\$\$/g, (_,m)=>tex(m,true));
  s = s.replace(/\$([^$\n]+?)\$/g, (_,m)=>tex(m,false));
  s = s.replace(/\[\[([^\]]+?)\]\]/g, (_,t)=>`<span class="gl" data-subj="${subj}" data-term="${esc(t)}">${esc(t)}</span>`);
  return s;
}
function pct(n,d){ return d? Math.round(100*n/d) : 0; }
function plain(s){ return String(s||"").replace(/<[^>]+>/g," ").replace(/\[\[|\]\]/g,"").replace(/\s+/g," ").trim(); }
function ymd(d){ const z=n=>String(n).padStart(2,"0"); return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}`; }
function todayStr(){ return ymd(new Date()); }
function parseDate(v){ if(!v) return null; const [y,m,d]=v.split("-").map(Number); if(!y||!m||!d) return null; return new Date(y,m-1,d); }
function addDaysStr(base,n){ const d=parseDate(base); d.setDate(d.getDate()+n); return ymd(d); }
function daysBetween(a,b){ const da=parseDate(a), db=parseDate(b); if(!da||!db) return null; return Math.round((db-da)/86400000); }
function daysUntil(v){ return daysBetween(todayStr(), v); }
function dateLabel(v){ const d=parseDate(v); if(!d) return "未設定"; return `${d.getMonth()+1}/${d.getDate()}(${["日","月","火","水","木","金","土"][d.getDay()]})`; }
function testBadge(sid){
  const v=meta().dates[sid]; if(!v) return "試験日未設定";
  const left=daysUntil(v);
  if(left<0) return `終了 ${dateLabel(v)}`;
  if(left===0) return `今日 ${dateLabel(v)}`;
  return `あと${left}日 ${dateLabel(v)}`;
}
function setTestDate(sid,value){
  if(value) meta().dates[sid]=value; else delete meta().dates[sid];
  save(); render();
}
function dateControl(sid){
  const v=meta().dates[sid]||"";
  return `<div class="examline" onclick="event.stopPropagation()">
    <label class="mini">試験日 <input type="date" value="${esc(v)}" onchange="setTestDate('${sid}',this.value)"></label>
    <span class="tag">${esc(testBadge(sid))}</span>
  </div>`;
}

const SUBJECT_TONES = {
  doshitsu1:{abbr:"DS1", field:"土質力学", accent:"#b45309", soft:"#fff3d2"},
  doshitsu3:{abbr:"DS3", field:"地盤と支持力", accent:"#9a3412", soft:"#ffedd5"},
  kozo1:{abbr:"K1", field:"構造力学", accent:"#2563eb", soft:"#dbeafe"},
  kozo2:{abbr:"K2", field:"応力と変形", accent:"#0f766e", soft:"#ccfbf1"},
  kozo3:{abbr:"K3", field:"エネルギー法", accent:"#0891b2", soft:"#cffafe"},
  suiri1:{abbr:"H1", field:"水理学", accent:"#0284c7", soft:"#e0f2fe"},
  suiri3:{abbr:"H3", field:"水理応用", accent:"#0369a1", soft:"#dbeafe"},
  oyosugaku1:{abbr:"M1", field:"応用数学", accent:"#475569", soft:"#e2e8f0"},
  keikaku2:{abbr:"P2", field:"計画学", accent:"#16a34a", soft:"#dcfce7"}
};
function subjectTone(id){ return SUBJECT_TONES[id] || {abbr:"ST", field:"Study", accent:"var(--c-accent)", soft:"var(--c-accent-soft)"}; }
function subjectStyle(id){ const t=subjectTone(id); return `--subject-accent:${t.accent};--subject-soft:${t.soft}`; }
function subjectMark(id){ const t=subjectTone(id); return `<div class="subject-mark" aria-hidden="true"><span>${esc(t.abbr)}</span></div>`; }


/* ---------- forgetting curve review ---------- */
const REVIEW_INTERVALS = [1,3,7,14,30,60];
const REVIEW_LABELS = ["翌日","3日後","1週間後","2週間後","1か月後","2か月後"];
function reviewKey(type,uid,id){ return `${type}:${uid}:${id}`; }
function reviewItem(sid,key,kind,title,href,ok=true){
  const s=st(sid), prev=s.rev[key]||{};
  const prevLevel = Number.isFinite(prev.level) ? prev.level : -1;
  const level = ok ? Math.min(prevLevel+1, REVIEW_INTERVALS.length-1) : -1;
  const due = addDaysStr(todayStr(), ok ? REVIEW_INTERVALS[level] : 0);
  s.rev[key]={kind:kind||prev.kind||"復習", title:title||prev.title||key, href:href||prev.href||`s/${sid}`, level, last:todayStr(), due, miss:ok?(prev.miss||0):(prev.miss||0)+1};
}
function reviewDueItems(sid){
  const s=st(sid), today=todayStr(), rows=[];
  Object.entries(s.rev||{}).forEach(([key,r])=>{
    const left=daysBetween(today,r.due);
    if(left!=null && left<=0){
      rows.push({kind:"忘却曲線復習", title:r.title||key, sub:`${r.kind||"復習"} / ${left<0?`${-left}日遅れ`:"今日"} / 次は${REVIEW_LABELS[r.level]||"復習"}`, href:r.href||`s/${sid}`, score:240+Math.min(80,Math.abs(left)*12)+(r.miss||0)*8, sid, reviewKey:key});
    }
  });
  return rows.sort((a,b)=>b.score-a.score);
}
function reviewDueCount(sid){ return reviewDueItems(sid).length; }
function reviewAllCount(sid){ return Object.keys(st(sid).rev||{}).length; }

/* ---------- progress and task computation ---------- */
function unitProg(subj, u){
  const s = st(subj); const parts=[];
  if(u.sections?.length) parts.push(pct(u.sections.filter((_,i)=>s.read[u.id+":"+i]).length, u.sections.length));
  if(u.formulas?.length) parts.push(pct(u.formulas.filter(f=>s.fmem[u.id+":"+f.id]).length, u.formulas.length));
  if(u.selectQuiz?.length) parts.push(pct(u.selectQuiz.filter((_,i)=>s.selq[u.id+":"+i]===1).length, u.selectQuiz.length));
  if(u.problems?.length) parts.push(pct(u.problems.filter(p=>s.prob[u.id+":"+p.id]==="ok").length, u.problems.length));
  if(u.quiz?.length) parts.push(pct(u.quiz.filter((_,i)=>s.quiz[u.id+":"+i]===1).length, u.quiz.length));
  return parts.length? Math.round(parts.reduce((a,b)=>a+b,0)/parts.length) : 0;
}
function subjProg(subj){
  const d = DATA[subj]; if(!d||!d.units.length) return 0;
  return Math.round(d.units.reduce((a,u)=>a+unitProg(subj,u),0)/d.units.length);
}
function fstage(subj,u,f){
  const s=st(subj), k=u.id+":"+f.id;
  if(s.fsolve[k]) return 3; if(s.fsel[k]) return 2; if(s.fmem[k]) return 1; return 0;
}
const STAGE_LABEL=["未着手","覚えた","選べる","解ける"];
const LEVEL_INFO={
  basic:{label:"基礎", cls:"basic", score:0, note:"公式を1つ選んで代入する"},
  standard:{label:"標準", cls:"standard", score:1, note:"条件整理と複数ステップ"},
  advanced:{label:"発展", cls:"advanced", score:2, note:"試験本番に近い総合問題"}
};
const LEVEL_FILTERS=[["all","全部"],["basic","基礎"],["standard","標準"],["advanced","発展"]];
function formulaById(u,id){ return (u.formulas||[]).find(f=>f.id===id); }
function problemLevel(p){
  const v=String(p?.level||p?.difficulty||"standard").toLowerCase();
  return LEVEL_INFO[v] ? v : "standard";
}
function levelBadge(level){
  const info=LEVEL_INFO[level]||LEVEL_INFO.standard;
  return `<span class="level-badge ${info.cls}">${esc(info.label)}</span>`;
}
function levelText(level){ return (LEVEL_INFO[level]||LEVEL_INFO.standard).label; }
function levelScore(level){ return (LEVEL_INFO[level]||LEVEL_INFO.standard).score; }
function solveFilter(sid,uid){
  const m=meta();
  m.solveFilters=m.solveFilters||{};
  return m.solveFilters[`${sid}:${uid}`] || "all";
}

function buildTasks(sid, limit){
  const d=DATA[sid]; if(!d) return [];
  const s=st(sid); const tasks=[];
  const due=daysUntil(meta().dates[sid]);
  if(due!=null && due<0) return [];
  const dueBoost=due==null?0:Math.max(0,80-due*3);
  if(s.mistakes.length){
    tasks.push({kind:"間違い復習", title:`間違いノート ${s.mistakes.length}件`, sub:"式ミス・計算ミス・選択ミスを先に潰す", href:`s/${sid}/mistakes`, score:260+dueBoost, sid});
  }
  reviewDueItems(sid).forEach(t=>tasks.push(Object.assign({},t,{score:t.score+dueBoost})));
  d.units.forEach(u=>{
    const up=unitProg(sid,u), base=(u.priority||1)*100+(100-up)+dueBoost;
    (u.sections||[]).forEach((sec,i)=>{
      if(!s.read[u.id+":"+i]) tasks.push({kind:"解説", title:sec.heading, sub:`${d.name} / ${u.title}`, href:`s/${sid}/u/${u.id}/learn`, score:base+18, sid});
    });
    (u.formulas||[]).forEach(f=>{
      const fs=fstage(sid,u,f);
      if(fs<1) tasks.push({kind:"公式暗記", title:f.name, sub:`まだ未着手 / ${u.title}`, href:`s/${sid}/u/${u.id}/formula`, score:base+42, sid});
      else if(fs<2) tasks.push({kind:"公式選択", title:f.name, sub:"覚えた公式を問題文から選べるようにする", href:`s/${sid}/u/${u.id}/select`, score:base+50, sid});
      else if(fs<3) tasks.push({kind:"計算演習", title:f.name, sub:"公式を使って解ける段階まで上げる", href:`s/${sid}/u/${u.id}/solve`, score:base+58, sid});
    });
    (u.selectQuiz||[]).forEach((q,i)=>{
      if(s.selq[u.id+":"+i]!==1) tasks.push({kind:"公式選択", title:q.q, sub:`${d.name} / ${u.title}`, href:`s/${sid}/u/${u.id}/select`, score:base+34, sid});
    });
    (u.problems||[]).forEach(p=>{
      const lv=problemLevel(p);
      if(s.prob[u.id+":"+p.id]!=="ok") tasks.push({kind:levelScore(lv)>=2?"発展演習":"計算演習", title:p.pattern, sub:`${d.name} / ${u.title} / ${levelText(lv)}`, href:`s/${sid}/u/${u.id}/solve`, score:base+45+levelScore(lv)*10, sid});
    });
    (u.quiz||[]).forEach((q,i)=>{
      if(s.quiz[u.id+":"+i]!==1) tasks.push({kind:"理解クイズ", title:q.q, sub:`${d.name} / ${u.title}`, href:`s/${sid}/u/${u.id}/quiz`, score:base+22, sid});
    });
  });
  const seen=new Set();
  const sorted=tasks.sort((a,b)=>b.score-a.score).filter(t=>{
    const k=t.kind+"|"+t.href+"|"+t.title;
    if(seen.has(k)) return false; seen.add(k); return true;
  });
  return limit? sorted.slice(0,limit):sorted;
}

  </div>`).join("")}</div>`;
}


function fmtBytes(n){

}

function bytesToBase64Url(bytes){
  let bin = "";
  const chunk = 0x8000;
  for(let i=0;i<bytes.length;i+=chunk){
    bin += String.fromCharCode(...bytes.slice(i,i+chunk));
  }
  return btoa(bin).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
}
function base64UrlToBytes(code){
  const clean = String(code||"").trim().replace(/\s+/g,"").replace(/-/g,"+").replace(/_/g,"/");
  if(!clean) throw new Error("コードが空です");
  const padded = clean + "=".repeat((4 - clean.length % 4) % 4);
  const bin = atob(padded);
  return Uint8Array.from(bin, c => c.charCodeAt(0));
}
function makeTransferCode(){
  save();
  const payload = JSON.stringify(buildBackup());
  return bytesToBase64Url(new TextEncoder().encode(payload));
}
function parseTransferCode(code){
  const raw = String(code||"").trim();
  if(!raw) throw new Error("コードが空です");
  if(raw.startsWith("{")) return parseBackupState(raw);
  const json = new TextDecoder().decode(base64UrlToBytes(raw));
  return parseBackupState(json);
}

function parseBackupState(raw){

  return state;
}

async function loadFirebase(){

  const [appMod, authMod, fsMod] = await Promise.all([
    import(`https://www.gstatic.com/firebasejs/${v}/firebase-app.js`),

  ]);

async function initCloudSync(){
  syncStatus.configured = hasFirebaseConfig();
  if(!syncStatus.configured){
    syncStatus.ready = true;
    syncStatus.mode = "未設定";
    return;
  }
  if(syncInitPromise) return syncInitPromise;
  syncStatus.mode = "初期化中";
  syncInitPromise = (async()=>{
    try{
      const fb = await loadFirebase();
      const appInstance = fb.getApps().length ? fb.getApp() : fb.initializeApp(firebaseConfig());
      syncAuth = fb.getAuth(appInstance);
      syncDb = fb.getFirestore(appInstance);
      await fb.getRedirectResult(syncAuth).catch(()=>null);
      fb.onAuthStateChanged(syncAuth, user => {
        syncStatus.ready = true;
        syncStatus.error = "";
        syncStatus.signedIn = !!user;
        syncStatus.email = user?.email || "";
        syncStatus.uid = user?.uid || "";
        if(syncUnsub){ syncUnsub(); syncUnsub = null; }
        if(user) attachCloudState(user);
        else syncStatus.mode = "未ログイン";
        syncRender();
      });
    }catch(e){
      syncStatus.ready = true;
      syncStatus.error = e?.message || String(e);
      syncStatus.mode = "同期初期化失敗";
      syncRender();
    }
  })();
  return syncInitPromise;
}
function cloudStateRef(uid){
  return syncFb.doc(syncDb, "users", uid, "state", "main");
}
function attachCloudState(user){
  if(!syncDb || !syncFb) return;
  syncStatus.mode = "接続中";
  const ref = cloudStateRef(user.uid);
  syncUnsub = syncFb.onSnapshot(ref, snap => {
    syncStatus.error = "";
    if(!snap.exists()){
      syncStatus.mode = "初回同期待ち";
      queueCloudSave(true);
      syncRender();
      return;
    }
    const remote = snap.data() || {};
    const remoteState = remote.state;
    const remoteMs = stateUpdatedAt(remoteState);
    const localMs = stateUpdatedAt(S);
    syncStatus.remoteUpdatedAt = remote.localUpdatedAt || remoteState?._meta?.updatedAt || "";
    syncStatus.lastPulled = nowIso();
    if(remoteState && remoteMs > localMs){
      syncPause = true;
      S = remoteState;
      meta().syncedAt = nowIso();
      save({keepUpdatedAt:true, skipCloud:true});
      syncPause = false;
      syncStatus.mode = "同期済み";
      toast("クラウドから同期しました");
      render();
      return;
    }
    if(localMs > remoteMs) queueCloudSave(true);
    syncStatus.mode = "同期済み";
    syncRender();
  }, err => {
    syncStatus.error = err?.message || String(err);
    syncStatus.mode = "同期エラー";
    syncRender();
  });
}
function queueCloudSave(force=false){
  if(syncPause || !syncAuth?.currentUser || !syncDb || !syncFb) return;
  clearTimeout(syncSaveTimer);
  const snapshot = cloneState();
  syncSaveTimer = setTimeout(()=>pushCloudState(snapshot), force ? 20 : 900);
}
async function pushCloudState(snapshot=cloneState()){

    app:"studyapp-2026",
    appVersion:APP_VERSION,
    state:snapshot,
    localUpdatedAt:snapshot?._meta?.updatedAt || nowIso(),
    updatedAt:syncFb.serverTimestamp()
  }, {merge:true});
  syncStatus.lastPushed = nowIso();
  syncStatus.mode = "同期済み";
  syncStatus.error = "";
  syncRender();
}
async function pullCloudState(){
  try{
    await initCloudSync();
    if(!syncAuth?.currentUser) throw new Error("ログインしていません");
    const snap = await syncFb.getDoc(cloudStateRef(syncAuth.currentUser.uid));
    if(!snap.exists()) throw new Error("クラウドに保存データがありません");
    const remoteState = snap.data()?.state;
    if(!remoteState) throw new Error("クラウドデータを読めません");
    const ok = stateUpdatedAt(remoteState) >= stateUpdatedAt(S) || confirm("クラウド側のデータがこの端末より古い可能性があります。取り込みますか？");
    if(!ok) return;
    syncPause = true;
    S = remoteState;
    meta().syncedAt = nowIso();
    save({keepUpdatedAt:true, skipCloud:true});
    syncPause = false;
    syncStatus.lastPulled = nowIso();
    syncStatus.mode = "同期済み";
    render();
    toast("クラウドから取り込みました");
  }catch(e){
    syncStatus.error = e?.message || String(e);
    syncStatus.mode = "同期エラー";
    render();
  }
}

function toast(msg){
  document.querySelectorAll(".toast").forEach(x=>x.remove());
  const t=document.createElement("div");
  t.className="toast";
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2200);
}
function registerPWA(){
  if(typeof window === "undefined" || typeof navigator === "undefined" || !("serviceWorker" in navigator)){
    storageStatus.sw = "非対応";
    return;
  }
  if(location.protocol === "file:"){
    storageStatus.sw = "fileでは無効";
    return;
  }
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("./sw.js").then(()=>{
      storageStatus.sw = "登録済み";
    }).catch(e=>{
      storageStatus.sw = "登録失敗";
      storageStatus.error = e?.message || String(e);
    });
  });
}

function render(){
  const h = location.hash.slice(1);
  window.scrollTo(0,0);
  if(!h || h==="home") return home();
  if(h==="calendar") return calendarView();
  if(h==="search") return searchView();
  if(h==="storage") return storageView();
  const m = h.split("/");
  if(m[0]==="s" && DATA[m[1]]){
    if(m[2]==="sheet") return sheet(m[1]);
    if(m[2]==="mistakes") return mistakesView(m[1]);
    if(m[2]==="beam") return beamLab(m[1]);
    if(m[2]==="u" && m[3]) return unit(m[1], m[3], m[4]||"learn");
    return subject(m[1]);
  }
  home();
}

function conceptState(sid,uid,cid,defaults={}){
  const m=meta();
  m.concepts=m.concepts||{};
  const key=`${sid}:${uid}:${cid}`;
  if(!m.concepts[key]) m.concepts[key]=Object.assign({},defaults);

}
function conceptSet(sid,uid,cid,k,v){
  const d=DATA[sid], u=d?.units?.find(x=>x.id===uid), c=(u?.concepts||[]).find(x=>x.id===cid);
  const defaults=Object.fromEntries((c?.controls||[]).map(ctrl=>[ctrl.key, ctrl.value]));
  const s=conceptState(sid,uid,cid,defaults);
  s[k]=Number(v);
  save(); render();
}
function conceptSvg(c,state){
  if(c.type==="hydroPressure") return hydroPressureLab(c,state);
  if(c.type==="beamMoment") return beamMomentConceptLab(c,state);
  if(c.type==="odeRoots") return odeRootsLab(c,state);
  if(c.type==="slopeStability") return slopeStabilityLab(c,state);
  if(c.type==="mohrCircle") return mohrCircleLab(c,state);
  if(c.svg) return `<div class="lab-svg">${c.svg}</div>`;
  return `<div class="empty">この概念図は準備中です</div>`;
}
function vConcept(sid,u){
  const concepts=u.concepts||[];
  if(!concepts.length) return '<div class="empty">この単元には概念図がまだありません</div>';

    const defaults=Object.fromEntries((c.controls||[]).map(ctrl=>[ctrl.key, ctrl.value]));
    const state=conceptState(sid,u.id,c.id,defaults);
    const controls=(c.controls||[]).map(ctrl=>{
      const value=Number.isFinite(Number(state[ctrl.key])) ? Number(state[ctrl.key]) : Number(ctrl.value||0);
      return `<label class="lab-control"><span><b>${esc(ctrl.label)}</b><em>${fmt(value,ctrl.digits??2)}${esc(ctrl.unit||"")}</em></span>
        <input type="range" min="${esc(ctrl.min)}" max="${esc(ctrl.max)}" step="${esc(ctrl.step||1)}" value="${esc(value)}" oninput="conceptSet('${sid}','${u.id}','${c.id}','${ctrl.key}',this.value)">

    }).join("");
    return `<section class="concept-card">
      <div class="concept-title"><div><span class="tag">${esc(c.kind||"概念")}</span><h3>${esc(c.title)}</h3></div>${c.level?levelBadge(c.level):""}</div>

        <div>${conceptSvg(c,state)}</div>
      </div>
    </section>`;
  }).join("")}</div>`;
}
function hydroPressureLab(c,s){
  const H=Math.max(0.2,Number(s.H||4)), gamma=Math.max(1,Number(s.gamma||9.8)), b=Math.max(0.2,Number(s.b||2));

  const x0=78,y0=32,h=238,w=170, scale=h/H, tri=`${x0+w},${y0} ${x0+w},${y0+h} ${x0+w+115},${y0+h}`;

    <rect x="32" y="${y0}" width="${x0-32}" height="${h}" fill="#bfdbfe" opacity=".45"/>
    <line x1="32" y1="${y0}" x2="${x0+w+150}" y2="${y0}" stroke="var(--c-accent)" stroke-width="2"/>
    <rect x="${x0+w}" y="${y0}" width="12" height="${h}" fill="var(--c-text)"/>
    <polygon points="${tri}" fill="#2563eb" opacity=".18" stroke="#2563eb" stroke-width="2"/>
    <line x1="${x0+w}" y1="${y0+h-hG*scale}" x2="${x0+w+78}" y2="${y0+h-hG*scale}" stroke="#16a34a" stroke-dasharray="5 4" stroke-width="2"/>
    <text x="${x0+w+86}" y="${y0+h-hG*scale+4}" fill="#16a34a" font-size="13">図心 hG=${fmt(hG,2)}m</text>
    <line x1="${x0+w}" y1="${y0+h-ycp*scale}" x2="${x0+w+112}" y2="${y0+h-ycp*scale}" stroke="#dc2626" stroke-width="3"/>
    <polygon points="${x0+w+124},${y0+h-ycp*scale} ${x0+w+110},${y0+h-ycp*scale-7} ${x0+w+110},${y0+h-ycp*scale+7}" fill="#dc2626"/>
    <text x="${x0+w+132}" y="${y0+h-ycp*scale+4}" fill="#dc2626" font-size="13">作用点 ${fmt(ycp,2)}m</text>
    <line x1="${x0-18}" y1="${y0}" x2="${x0-18}" y2="${y0+h}" stroke="var(--c-sub)" stroke-width="1.5"/>
    <text x="${x0-26}" y="${y0+h/2}" text-anchor="end" fill="var(--c-sub)" font-size="13">H=${fmt(H,2)}m</text>
    <text x="36" y="304" fill="var(--c-sub)" font-size="13">圧力は深さに比例するので三角形分布になる</text>
  </svg></div>
  <div class="lab-output"><div><span class="mini">全水圧 P</span><b>${fmt(P,2)} kN</b></div><div><span class="mini">図心深さ</span><b>${fmt(hG,2)} m</b></div><div><span class="mini">圧力中心</span><b>${fmt(ycp,2)} m</b></div></div>`;
}
function beamMomentConceptLab(c,s){
  const L=Math.max(2,Number(s.L||6)), P=Number(s.P||20), a=clamp(Number(s.a||3),0.05,L-0.05), b=L-a;
  const RA=P*b/L, RB=P*a/L, Mmax=RA*a;
  const x0=52,x1=520,y=95,bw=x1-x0, x=v=>x0+bw*v/L, mid=218, amp=58;
  const pts=Array.from({length:121},(_,i)=>{ const xx=L*i/120; const M=xx<=a?RA*xx:RA*xx-P*(xx-a); return `${x(xx)},${mid-(M/Math.max(Math.abs(Mmax),1e-9))*amp}`; }).join(" ");
  return `<div class="lab-svg"><svg viewBox="0 0 560 320" role="img">
    <line x1="${x0}" y1="${y}" x2="${x1}" y2="${y}" stroke="var(--c-text)" stroke-width="8" stroke-linecap="round"/>
    ${supportIcon("pin",x0,y)}${supportIcon("roller",x1,y)}${arrowDown(x(a),28,y-18,`P=${fmt(P,1)}`)}
    ${arrowUp(x0,y+58,y+18,`RA=${fmt(RA,1)}`,"#16a34a")}${arrowUp(x1,y+58,y+18,`RB=${fmt(RB,1)}`,"#16a34a")}
    <line x1="${x0}" y1="${mid}" x2="${x1}" y2="${mid}" stroke="var(--c-line)" stroke-width="1.5"/>
    <polyline points="${pts}" fill="none" stroke="#d97706" stroke-width="3"/>
    <polygon points="${x0},${mid} ${pts} ${x1},${mid}" fill="#d97706" opacity=".14"/>
    <text x="48" y="30" fill="var(--c-text)" font-size="14">荷重位置 a を動かすと反力比と最大Mが変わる</text>
    <text x="${x(a)}" y="${mid-amp-8}" text-anchor="middle" fill="#d97706" font-size="13">Mmax=${fmt(Mmax,2)}</text>
  </svg></div>
  <div class="lab-output"><div><span class="mini">左反力 RA</span><b>${fmt(RA,2)} kN</b></div><div><span class="mini">右反力 RB</span><b>${fmt(RB,2)} kN</b></div><div><span class="mini">最大M</span><b>${fmt(Mmax,2)} kN m</b></div></div>`;
}
function odeRootsLab(c,s){
  const p=Number(s.p||2), q=Number(s.q||1), D=p*p-4*q;
  let label, solution;
  if(D>0.02){ const r1=(-p+Math.sqrt(D))/2, r2=(-p-Math.sqrt(D))/2; label="異なる実根"; solution=`C1e^{${fmt(r1,2)}t}+C2e^{${fmt(r2,2)}t}`; }
  else if(D<-0.02){ const a=-p/2, b=Math.sqrt(-D)/2; label="複素根"; solution=`e^{${fmt(a,2)}t}(C1\\\\cos ${fmt(b,2)}t+C2\\\\sin ${fmt(b,2)}t)`; }
  else { const r=-p/2; label="重根"; solution=`(C1+C2t)e^{${fmt(r,2)}t}`; }
  const cx=280, cy=158, sx=52, sy=52;
  const pts=Array.from({length:101},(_,i)=>{ const x=(i-50)/10, y=x*x+p*x+q; return `${50+i*4.6},${cy-y*10}`; }).join(" ");
  const roots=D>=0 ? [(-p+Math.sqrt(Math.max(0,D)))/2,(-p-Math.sqrt(Math.max(0,D)))/2] : [];
  return `<div class="lab-svg"><svg viewBox="0 0 560 320" role="img">
    <line x1="40" y1="${cy}" x2="522" y2="${cy}" stroke="var(--c-line)" stroke-width="1.5"/>
    <line x1="${cx}" y1="34" x2="${cx}" y2="286" stroke="var(--c-line)" stroke-width="1.5"/>
    <polyline points="${pts}" fill="none" stroke="#2563eb" stroke-width="3"/>
    ${roots.map(r=>`<circle cx="${50+(r+5)*46}" cy="${cy}" r="6" fill="#dc2626"/><text x="${50+(r+5)*46}" y="${cy+22}" text-anchor="middle" fill="#dc2626" font-size="12">${fmt(r,2)}</text>`).join("")}
    <text x="48" y="42" fill="var(--c-text)" font-size="14">特性方程式 r² + ${fmt(p,1)}r + ${fmt(q,1)} = 0</text>
    <text x="48" y="68" fill="var(--c-sub)" font-size="13">判別式 D=p²-4q=${fmt(D,2)} → ${esc(label)}</text>
  </svg></div>
  <div class="lab-output"><div><span class="mini">根の型</span><b>${esc(label)}</b></div><div><span class="mini">判別式</span><b>${fmt(D,2)}</b></div></div>
  <div class="lab-equation">解の形: $${solution}$</div>`;
}
function slopeStabilityLab(c,s){
  const beta=Number(s.beta||30), phi=Number(s.phi||35), cval=Number(s.c||5), gamma=Number(s.gamma||18), z=Number(s.z||2), water=Number(s.water||0);
  const rad=d=>d*Math.PI/180, gammaEff=gamma-(9.8*water), resisting=cval+gammaEff*z*Math.cos(rad(beta))**2*Math.tan(rad(phi)), driving=gamma*z*Math.sin(rad(beta))*Math.cos(rad(beta));
  const F=resisting/(driving||1), ok=F>=1.2;
  const x0=50,y0=250, len=410, a=rad(beta), x1=x0+len*Math.cos(a), y1=y0-len*Math.sin(a), zPix=52;
  return `<div class="lab-svg"><svg viewBox="0 0 560 320" role="img">
    <polygon points="${x0},${y0} ${x1},${y1} ${x1},${y0}" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <line x1="${x0+40}" y1="${y0-zPix}" x2="${x1-24}" y2="${y1-zPix}" stroke="#dc2626" stroke-width="3" stroke-dasharray="8 5"/>
    <line x1="${x0+70}" y1="${y0-4}" x2="${x0+112}" y2="${y0-4}" stroke="var(--c-sub)" stroke-width="1.5"/>
    <path d="M ${x0+72} ${y0-3} A 46 46 0 0 0 ${x0+72+44*Math.cos(a)} ${y0-3-44*Math.sin(a)}" fill="none" stroke="var(--c-sub)" stroke-width="1.5"/>
    <text x="${x0+118}" y="${y0-26}" fill="var(--c-sub)" font-size="13">β=${fmt(beta,1)}°</text>
    <text x="${x0+130}" y="${y0-92}" fill="#dc2626" font-size="13">すべり面深さ z=${fmt(z,1)}m</text>
    <text x="52" y="42" fill="var(--c-text)" font-size="14">抵抗 = c + γ' z cos²β tanφ / 滑動 = γ z sinβ cosβ</text>
    <text x="52" y="66" fill="${ok?"#16a34a":"#dc2626"}" font-size="15" font-weight="700">安全率 F=${fmt(F,2)} ${ok?"安定側":"要注意"}</text>
  </svg></div>
  <div class="lab-output"><div><span class="mini">滑動力</span><b>${fmt(driving,2)}</b></div><div><span class="mini">抵抗力</span><b>${fmt(resisting,2)}</b></div><div><span class="mini">安全率</span><b>${fmt(F,2)}</b></div></div>`;
}
function mohrCircleLab(c,s){
  const sx=Number(s.sigmaX||40), sy=Number(s.sigmaY||100), tau=Number(s.tau||25);
  const center=(sx+sy)/2, rad=Math.sqrt(((sx-sy)/2)**2+tau*tau), s1=center+rad, s3=center-rad;
  const xmin=Math.min(0,s3-20), xmax=s1+30, scale=430/(xmax-xmin), ox=70-xmin*scale, cy=160, r=rad*scale;

    <line x1="${ox}" y1="34" x2="${ox}" y2="286" stroke="var(--c-line)" stroke-width="1.5"/>
    <circle cx="${ox+center*scale}" cy="${cy}" r="${r}" fill="#2563eb" opacity=".1" stroke="#2563eb" stroke-width="3"/>
    <circle cx="${ox+sx*scale}" cy="${cy-tau*scale}" r="5" fill="#dc2626"/><circle cx="${ox+sy*scale}" cy="${cy+tau*scale}" r="5" fill="#dc2626"/>
    <line x1="${ox+sx*scale}" y1="${cy-tau*scale}" x2="${ox+sy*scale}" y2="${cy+tau*scale}" stroke="#dc2626" stroke-width="2"/>
    <text x="48" y="42" fill="var(--c-text)" font-size="14">モール円: 中心 ${(fmt(center,1))}, 半径 ${fmt(rad,1)}</text>
    <text x="${ox+s1*scale}" y="${cy+22}" text-anchor="middle" fill="#16a34a" font-size="13">σ1=${fmt(s1,1)}</text>
    <text x="${ox+s3*scale}" y="${cy+22}" text-anchor="middle" fill="#16a34a" font-size="13">σ3=${fmt(s3,1)}</text>
  </svg></div>
  <div class="lab-output"><div><span class="mini">最大主応力 σ1</span><b>${fmt(s1,2)}</b></div><div><span class="mini">最小主応力 σ3</span><b>${fmt(s3,2)}</b></div><div><span class="mini">最大せん断</span><b>${fmt(rad,2)}</b></div></div>`;
}

/* --- 公式カード --- */
let fmode="show";
function vFormula(sid,u){
  const modes=[["show","表示"],["blank","穴埋め"],["recall","白紙再現"]];
  const mbtns = modes.map(([k,l])=>`<button class="${fmode===k?'primary':''}" onclick="fmode='${k}';render()">${l}</button>`).join("");

}
function fcardHTML(sid,u,f,mode){
  const stg=fstage(sid,u,f);
  const head=`<div class="fname"><span>${esc(f.name)}</span><span class="stage s${stg}">${STAGE_LABEL[stg]}</span></div>`;
  const varsT = (f.vars||[]).map(v=>`<tr><td>${tex(v.sym)}</td><td>${esc(v.meaning)}</td><td class="mini">${esc(v.unit||"")}</td></tr>`).join("");
  const detail=`<table class="vars">${varsT}</table>
    <div class="whenbox"><b>使いどころ:</b> ${md(f.when||"",sid)}</div>
    <div class="mini" style="margin:4px 0">${md(f.intuition||"",sid)}</div>

  if(mode==="show") return `<div class="fcard">${head}<div class="flatex">${tex(f.latex,true)}</div>${detail}</div>`;
  if(mode==="blank"){
    return `<div class="fcard">${head}<div class="flatex">${tex(f.blank||f.latex,true)}</div>
      <div id="ba-${k}" style="display:none"><div class="flatex">${tex(f.latex,true)}</div>
        <div class="rowbtns"><button class="primary" onclick="gradeF('${sid}','${k}',1)">正解できた</button><button onclick="gradeF('${sid}','${k}',0)">まだ</button></div></div>

      <div class="rowbtns"><button class="primary" onclick="gradeF('${sid}','${k}',1)">書けた</button><button onclick="gradeF('${sid}','${k}',0)">まだ</button></div></div>

function gradeF(sid,k,ok){
  const s=st(sid), [uid,fid]=k.split(":");

/* --- 公式選択・クイズ --- */
function vSelect(sid,u){ return (u.selectQuiz||[]).map((q,i)=>qHTML(sid,u,q,i,"selq","fsel",q.formulaRef)).join("") || '<p class="notice">問題なし</p>'; }
function vQuiz(sid,u){ return (u.quiz||[]).map((q,i)=>qHTML(sid,u,q,i,"quiz",null,null)).join("") || '<p class="notice">問題なし</p>'; }
function findChoiceFormula(u,choice){
  const t=plain(choice).replace(/\s/g,"");
  return (u.formulas||[]).find(f=>{
    const name=plain(f.name).replace(/\s/g,"");
    const head=plain(f.latex||"").split("=")[0].replace(/[\\{}\s]/g,"");
    return (name && t.includes(name)) || (head && t.includes(head));
  });
}
function qReviewHTML(sid,u,q,bucket,k,done,picked,fref){
  const correct = q.choices[q.answer];
  const pickedText = picked==null ? "" : q.choices[picked];
  const f = fref ? formulaById(u,fref) : null;
  const pickedF = done===0 ? findChoiceFormula(u,pickedText||"") : null;
  return `<div class="expl">${done===1?"正解。":"不正解。"}${md(q.expl||"",sid)}
    ${done===0?`<div class="diffbox"><b>選んだもの:</b> ${md(pickedText||"不明",sid)}<br><b>正解:</b> ${md(correct,sid)}</div>`:""}
    ${pickedF&&(!f||pickedF.id!==f.id)?`<div class="diffbox"><b>選んだ式の使いどころ:</b> ${md(pickedF.when||"",sid)}<br><span class="mini">問題文の条件と式の用途を見比べると、取り違えを減らせます。</span></div>`:""}
    ${f?`<div class="diffbox"><b>正解の公式:</b> ${esc(f.name)}<br><b>使いどころ:</b> ${md(f.when||"",sid)}<br><span class="mini">${md(f.intuition||"",sid)}</span></div>
      <div><a href="#s/${sid}/u/${u.id}/formula">該当の公式カードを見る</a></div>`:""}
    <div class="rowbtns"><button onclick="resetQ('${sid}','${u.id}',${k.split(':')[1]},'${bucket}')">もう一回</button></div>
  </div>`;
}
function qHTML(sid,u,q,i,bucket,fbucket,fref){
  const s=st(sid); const k=u.id+":"+i; const done=s[bucket][k];
  const pickKey=bucket+":"+k; const picked=s.pick[pickKey] ?? q.wrongPick ?? null;
  const choices=q.choices.map((c,ci)=>{
    let cls="choice";
    if(done!==undefined){ if(ci===q.answer) cls+=" ok"; else if(done===0&&ci===picked) cls+=" ng"; }
    return `<button class="${cls}" onclick="answerQ('${sid}','${u.id}',${i},${ci},'${bucket}','${fbucket||""}','${fref||""}')">${md(c,sid)}</button>`;
  }).join("");
  return `<div class="card"><div class="qtext">Q${i+1}. ${md(q.q,sid)}</div>${choices}
    ${done!==undefined?qReviewHTML(sid,u,q,bucket,k,done,picked,fref):""}</div>`;
}
function answerQ(sid,uid,i,ci,bucket,fbucket,fref){
  const d=DATA[sid], u=d.units.find(x=>x.id===uid);
  const q=(bucket==="selq"?u.selectQuiz:u.quiz)[i];
  if(st(sid)[bucket][uid+":"+i]!==undefined) return;
  const ok = ci===q.answer ?1:0;
  const s=st(sid); s[bucket][uid+":"+i]=ok; s.pick[bucket+":"+uid+":"+i]=ci;
  if(fbucket && fref && ok){
    s[fbucket][uid+":"+fref]=1;
    const f=formulaById(u,fref);
    reviewItem(sid,reviewKey("formula",uid,fref),"公式復習",f?.name||"公式",`s/${sid}/u/${uid}/formula`,true);
  }
  reviewItem(sid,reviewKey(bucket,uid,i),bucket==="selq"?"公式選択復習":"理解復習",q.q,`s/${sid}/u/${uid}/${bucket==="selq"?"select":"quiz"}`,!!ok);
  if(!ok) logMistake(sid,{type:bucket==="selq"?"公式選択ミス":"理解クイズミス", title:q.q, detail:`選択: ${plain(q.choices[ci])} / 正解: ${plain(q.choices[q.answer])}`, href:`s/${sid}/u/${uid}/${bucket==="selq"?"select":"quiz"}`, advice:q.expl||""});
  save(); render();
}
function resetQ(sid,uid,i,bucket){
  const s=st(sid); delete s[bucket][uid+":"+i]; delete s.pick[bucket+":"+uid+":"+i]; save(); render();
}

/* --- 計算演習 --- */
const probState={};
function formulaHintHTML(sid,u,refs){
  const fs=(refs||[]).map(id=>formulaById(u,id)).filter(Boolean);
  if(!fs.length) return `<div class="hintbox">この問題は、まず問題文の量と単位を整理してから式を選びます。</div>`;
  return `<div class="hintbox"><b>使う候補の公式</b>${fs.map(f=>`<div class="sheet-f"><b>${esc(f.name)}</b><div class="flatex" style="padding:4px">${tex(f.latex,true)}</div><div class="mini">${md(f.when||"",sid)}</div></div>`).join("")}</div>`;
}
function vSolve(sid,u){
  const filter=solveFilter(sid,u.id);
  const problems=(u.problems||[]).slice().sort((a,b)=>levelScore(problemLevel(a))-levelScore(problemLevel(b)));
  const filtered=filter==="all" ? problems : problems.filter(p=>problemLevel(p)===filter);
  const counts=LEVEL_FILTERS.map(([k,l])=>{
    const n=k==="all" ? problems.length : problems.filter(p=>problemLevel(p)===k).length;
    return [k,`${l}${n?` ${n}`:""}`];
  });
  const intro=`<div class="levelbar"><span class="mini">難易度</span>${counts.map(([k,l])=>`<button class="${filter===k?'on':''}" onclick="setSolveFilter('${sid}','${u.id}','${k}')">${esc(l)}</button>`).join("")}</div>
    <div class="hintbox"><b>段階演習</b><div class="mini">基礎で公式の入口を確認し、標準で条件整理、発展で図や複数条件を含む本番型に進みます。</div></div>`;
  if(!filtered.length) return intro + '<div class="empty">この難易度の問題はまだありません</div>';
  return intro + filtered.map(p=>{
    const variants=p.variants||[];
    if(!variants.length) return `<div class="card"><span class="tag">${esc(p.pattern||"計算演習")}</span><div class="empty">この演習には問題データがありません</div></div>`;
    const key=u.id+":"+p.id;
    const ps=probState[key]||{v:0,step:0,hint:false,scratch:""};
    const variant=variants[ps.v % variants.length];
    const shown=variant.steps.slice(0,ps.step).map(stp=>`<div class="stepbox"><div class="slabel">${esc(stp.label)}</div><div>${md(stp.content,sid)}</div></div>`).join("");
    const doneAll=ps.step>=variant.steps.length;
    const status=st(sid).prob[key];
    const lv=problemLevel(p);
    return `<div class="card">
      <div class="problem-head">
        <div class="problem-meta">${levelBadge(lv)}<span class="tag">${esc(p.pattern)}</span>${p.source?`<span class="tag">${esc(p.source)}</span>`:""}</div>
        <span class="mini">${status==="ok"?"習得":"未習得"} ｜ バリエーション ${ps.v%variants.length+1}/${variants.length}</span>
      </div>
      ${(p.goal||p.trap||p.reading)?`<div class="problem-note">
        ${p.goal?`<div class="mini"><b>狙い:</b> ${esc(p.goal)}</div>`:""}
        ${p.reading?`<div class="mini"><b>図で見る点:</b> ${esc(p.reading)}</div>`:""}
        ${p.trap?`<div class="mini"><b>ひっかけ:</b> ${esc(p.trap)}</div>`:""}
      </div>`:""}
      <div class="qtext" style="margin-top:8px">${md(variant.q,sid)}</div>
      ${ps.step===0&&!doneAll?`<div class="hintbox"><b>まず自力で解く</b><div class="mini">紙か下のメモ欄で、式の選択、代入、単位確認までやってからヒントを開く。</div>
        <textarea placeholder="途中式メモ欄(保存はこの画面を開いている間だけ)" oninput="probScratch('${key}',this.value)">${esc(ps.scratch||"")}</textarea></div>`:""}
      ${ps.hint?formulaHintHTML(sid,u,p.formulaRefs):""}
      ${shown}
      ${doneAll?`<div class="expl"><b>答え: </b>${md(variant.answer,sid)}</div>
        <div class="rowbtns">
          <button class="primary" onclick="probResult('${sid}','${key}','ok')">自力で解けた</button>
          <button onclick="probResult('${sid}','${key}','formula')">式を間違えた</button>
          <button onclick="probResult('${sid}','${key}','calc')">計算を間違えた</button>
          <button class="ghost" onclick="probNext('${key}',${variants.length})">数値を変えてもう一回</button>
        </div>`
      :`<div class="rowbtns">
          <button onclick="probHint('${key}')">公式だけ見る</button>
          <button class="primary" onclick="probStep('${key}')">${ps.step===0?"1ステップだけ見る":"次のステップ"}</button>
          <button class="ghost" onclick="probState['${key}']={v:${ps.v},step:99,hint:true,scratch:probState['${key}']?.scratch||''};render()">全部見る</button>
        </div>`}
    </div>`;
  }).join("") || '<p class="notice">問題なし</p>';
}
function probScratch(k,v){ const ps=probState[k]||{v:0,step:0,hint:false,scratch:""}; ps.scratch=v; probState[k]=ps; }
function probHint(k){ const ps=probState[k]||{v:0,step:0,hint:false,scratch:""}; ps.hint=true; probState[k]=ps; render(); }
function probStep(k){ const ps=probState[k]||{v:0,step:0,hint:false,scratch:""}; ps.step++; probState[k]=ps; render(); }
function probNext(k,n){ const ps=probState[k]||{v:0,step:0,hint:false,scratch:""}; probState[k]={v:ps.v+1,step:0,hint:false,scratch:""}; render(); }
function probResult(sid,key,r){
  const s=st(sid); const [uid]=key.split(":"); const u=DATA[sid].units.find(x=>x.id===uid);
  const p=(u.problems||[]).find(x=>uid+":"+x.id===key);
  const ps=probState[key]||{v:0,step:0}; const variant=p?.variants?.[ps.v % (p?.variants?.length||1)];
  if(r==="ok"){
    s.prob[key]="ok";
    reviewItem(sid,reviewKey("problem",uid,p?.id||key),"計算復習",p?.pattern||"計算演習",`s/${sid}/u/${uid}/solve`,true);
    (p?.formulaRefs||[]).forEach(fr=>{
      s.fsolve[uid+":"+fr]=1;
      const f=formulaById(u,fr);
      reviewItem(sid,reviewKey("formula",uid,fr),"公式復習",f?.name||"公式",`s/${sid}/u/${uid}/formula`,true);
    });
  }
  else {
    s.miss[r==="formula"?"formula":"calc"]++; delete s.prob[key];
    reviewItem(sid,reviewKey("problem",uid,p?.id||key),"計算復習",p?.pattern||"計算演習",`s/${sid}/u/${uid}/solve`,false);
    logMistake(sid,{type:r==="formula"?"式ミス":"計算ミス", title:p?.pattern||"計算演習", detail:plain(variant?.q||""), href:`s/${sid}/u/${uid}/solve`, advice:r==="formula"?"問題文の条件から、どの公式を選ぶかを先に言語化する。":"単位、桁、三角関数、符号を最後に確認する。"});
  }
  save(); const cur=probState[key]; if(cur){ cur.step=0; cur.hint=false; } render();
}

function reviewSheetHTML(sid){

function sheet(sid){
  const d=DATA[sid]; const filter=sheetFilter(sid);

  const filters=[["all","全部"],["unstarted","未着手"],["needSelect","選べる未満"],["needSolve","解ける未満"],["priority","最頻出"],["review","復習期限"],["mistakes","間違いあり"]];
  const formulaHTML=rows.map(({u,f,stg})=>`<div class="sheet-f">

    <div class="rowbtns"><button onclick="nav('s/${sid}/u/${u.id}/formula')">公式</button><button onclick="nav('s/${sid}/u/${u.id}/select')">選択</button><button onclick="nav('s/${sid}/u/${u.id}/solve')">演習</button></div>
  </div>`).join("");
  const body = filter==="mistakes" ? mistakeSheetHTML(sid) : filter==="review" ? reviewSheetHTML(sid) : (formulaHTML||'<div class="empty">この条件の公式はありません</div>');
  app.innerHTML=`<div class="topbar"><button class="ghost" onclick="nav('s/${sid}')">←</button>
    <div><b>直前モード</b><div class="crumb">${esc(d.name)} ｜ 弱い公式が上に来ます</div></div></div>
    <div class="filterbar">${filters.map(([k,l])=>`<button class="${filter===k?'on':''}" onclick="setSheetFilter('${sid}','${k}')">${l}</button>`).join("")}</div>

/* --- 学習カレンダー --- */
function planPhase(sid,left,offset){
  if(left===0) return {kind:"試験日", title:"直前モードで公式だけ確認", href:`s/${sid}/sheet`};
  if(left===1) return {kind:"前日", title:"間違いノートと解ける未満の公式を確認", href:st(sid).mistakes.length?`s/${sid}/mistakes`:`s/${sid}/sheet`};
  const tasks=buildTasks(sid,12);
  if(!tasks.length) return {kind:"維持", title:"直前モードで軽く確認", href:`s/${sid}/sheet`};
  let pool;
  if(left<=3) pool=tasks.filter(t=>t.kind==="計算演習"||t.kind==="間違い復習");
  else if(left<=7) pool=tasks.filter(t=>t.kind==="公式選択"||t.kind==="計算演習");
  else pool=tasks.filter(t=>t.kind==="解説"||t.kind==="公式暗記");
  if(!pool.length) pool=tasks;
  const picked=pool[offset%pool.length];
  return {kind:picked.kind, title:picked.title, href:picked.href};
}
function calendarView(){
  const today=todayStr();
  const entries=ORDER.filter(id=>DATA[id]&&meta().dates[id]).map(id=>({id,date:meta().dates[id],left:daysUntil(meta().dates[id])})).sort((a,b)=>a.left-b.left);
  const upcoming=entries.filter(e=>e.left>=0);
  const maxLeft=upcoming.length?Math.max(...upcoming.map(e=>e.left)):0;
  const span=Math.min(Math.max(maxLeft,0),21);
  const settings=`<div class="card"><div class="fname"><b>試験日設定</b><span class="mini">各科目の日程を入れると予定が自動更新されます</span></div>
    <div class="dategrid">${ORDER.filter(id=>DATA[id]).map(id=>`<label class="date-row"><span><b>${esc(DATA[id].name)}</b><br><span class="mini">${esc(testBadge(id))}</span></span><input type="date" value="${esc(meta().dates[id]||"")}" onchange="setTestDate('${id}',this.value)"></label>`).join("")}</div></div>`;
  const days = upcoming.length ? Array.from({length:span+1},(_,i)=>{
    const day=addDaysStr(today,i);
    const items=upcoming.map(e=>{
      const left=daysBetween(day,e.date);
      if(left<0 || left>21) return "";
      const p=planPhase(e.id,left,i);
      return `<div class="planitem"><div><span class="tag">${esc(DATA[e.id].name)}</span><b>${esc(p.kind)}</b><div class="mini">${esc(p.title)} / ${left===0?"当日":`あと${left}日`}</div></div><button onclick="nav('${p.href}')">開く</button></div>`;
    }).filter(Boolean).join("");
    return items?`<div class="daycard"><div class="dayhead"><b>${dateLabel(day)}</b><span class="mini">${i===0?"今日":day}</span></div>${items}</div>`:"";
  }).join("") : `<div class="empty">まず試験日を設定してください</div>`;
  const far=upcoming.filter(e=>e.left>21).map(e=>`${DATA[e.id].name}: あと${e.left}日`).join(" / ");
  app.innerHTML=`<div class="topbar"><button class="ghost" onclick="nav('home')">←</button><h1>学習カレンダー</h1><span class="spacer"></span><button onclick="nav('search')">検索</button></div>
    ${settings}<div class="card"><b>逆算スケジュール</b><div class="mini">21日先まで表示。直前ほど計算演習と間違い復習を厚くします。</div>${far?`<div class="notice">21日より先: ${esc(far)}</div>`:""}<div class="calendar">${days}</div></div>`;
}

function searchResultsHTML(q){
  const key=plain(q).toLowerCase();
  if(!key) return `<div class="empty">公式名、用語、計算手順、クイズ、間違いノートまで検索できます</div>`;
  const res=[];
  function hit(txt){ return plain(txt).toLowerCase().includes(key); }
  ORDER.filter(id=>DATA[id]).forEach(sid=>{
    const d=DATA[sid], ss=st(sid);
    if(hit(d.name)||hit(d.examTips)) res.push({kind:"科目", title:d.name, sub:d.examTips, href:`s/${sid}`});
    (ss.mistakes||[]).forEach(m=>{ if(hit(m.type)||hit(m.title)||hit(m.detail)||hit(m.advice)) res.push({kind:"ミス", title:m.title||m.type, sub:`${m.type} / ${m.detail||m.advice||""}`, href:m.href||`s/${sid}/mistakes`}); });
    (d.glossary||[]).forEach(g=>{ if(hit(g.term)||hit(g.reading)||hit(g.def)) res.push({kind:"用語", title:g.term, sub:g.def, href:`s/${sid}`}); });
    (d.units||[]).forEach(u=>{
      if(hit(u.title)) res.push({kind:"単元", title:u.title, sub:d.name, href:`s/${sid}/u/${u.id}/learn`});
      (u.sections||[]).forEach(sec=>{ if(hit(sec.heading)||hit(sec.body)) res.push({kind:"解説", title:sec.heading, sub:`${d.name} / ${u.title}`, href:`s/${sid}/u/${u.id}/learn`}); });
      (u.formulas||[]).forEach(f=>{
        const vars=(f.vars||[]).map(v=>`${v.sym} ${v.meaning} ${v.unit||""}`).join(" ");
        if(hit(f.name)||hit(f.latex)||hit(f.when)||hit(f.intuition)||hit(f.derivation)||hit(vars)) res.push({kind:"公式", title:f.name, sub:`${d.name} / ${plain(f.when||"")}`, href:`s/${sid}/u/${u.id}/formula`});
      });
      (u.selectQuiz||[]).forEach((x,i)=>{ if(hit(x.q)||hit(x.expl)||x.choices?.some(hit)) res.push({kind:"公式選択", title:x.q, sub:`${d.name} / ${u.title}`, href:`s/${sid}/u/${u.id}/select`}); });
      (u.quiz||[]).forEach((x,i)=>{ if(hit(x.q)||hit(x.expl)||x.choices?.some(hit)) res.push({kind:"クイズ", title:x.q, sub:`${d.name} / ${u.title}`, href:`s/${sid}/u/${u.id}/quiz`}); });
      (u.problems||[]).forEach(p=>{
        const body=(p.variants||[]).map(v=>`${v.q} ${v.answer} ${(v.steps||[]).map(st=>`${st.label} ${st.content}`).join(" ")}`).join(" ");
        if(hit(p.pattern)||hit(body)) res.push({kind:"計算", title:p.pattern, sub:`${d.name} / ${u.title}`, href:`s/${sid}/u/${u.id}/solve`});
      });
    });
  });
  if(!res.length) return `<div class="empty">該当なし</div>`;
  return res.slice(0,80).map(r=>`<div class="result"><span class="tag">${esc(r.kind)}</span><b>${esc(r.title)}</b><div class="mini">${esc(plain(r.sub).slice(0,160))}</div><div class="rowbtns"><button onclick="nav('${r.href}')">開く</button></div></div>`).join("");
}

/* --- 構造図シミュレータ --- */
const BEAM_DEFAULT = {mode:"template", support:"simple", load:"point", L:6, P:20, a:3, w:5, EI:20000, LLabel:"", PLabel:"", aLabel:"", wLabel:"", EILabel:"", tool:"force", items:[]};
const BEAM_TOOLS = {pin:"ピン", roller:"ローラー", fixed:"固定端", force:"力", moment:"モーメント"};
function num(v, fallback){ const n=Number(v); return Number.isFinite(n)?n:fallback; }
function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
function fmt(n,d=2){
  if(!Number.isFinite(n)) return "-";
  const a=Math.abs(n);
  const digits=a>=100?0:a>=10?1:d;
  return Number(n).toFixed(digits).replace(/\.0+$/,"").replace(/(\.\d*?)0+$/,"$1");
}
function beamCleanLabel(v){ return String(v||"").replace(/[<>]/g,"").slice(0,18); }
function beamItem(type,x,extra={}){
  const item={type, x, xLabel:beamCleanLabel(extra.xLabel||"")};
  if(type==="force"){ item.P=extra.P ?? 20; item.PLabel=beamCleanLabel(extra.PLabel||""); }
  if(type==="moment"){ item.M=extra.M ?? 20; item.MLabel=beamCleanLabel(extra.MLabel||""); }
  return item;
}
function beamDefaultItems(b){
  const x=clamp(num(b.a,b.L/2),0.05,b.L);
  if(b.support==="cantilever") return [beamItem("fixed",0), beamItem("force",x,{P:b.P})];
  return [beamItem("pin",0), beamItem("roller",b.L), beamItem("force",x,{P:b.P})];
}
function beamState(sid){
  const m=meta();
  if(!m.beam || typeof m.beam !== "object" || Array.isArray(m.beam)) m.beam={};
  if(!m.beam[sid]) m.beam[sid]=Object.assign({},BEAM_DEFAULT);
  return beamNormalize(m.beam[sid]);
}
function beamNormalize(b){
  b.mode = b.mode==="free" ? "free" : "template";
  b.support = b.support==="cantilever" ? "cantilever" : "simple";
  b.load = b.load==="uniform" ? "uniform" : "point";
  b.tool = BEAM_TOOLS[b.tool] ? b.tool : "force";
  b.L = clamp(num(b.L,BEAM_DEFAULT.L),2,12);
  b.P = clamp(num(b.P,BEAM_DEFAULT.P),-80,80);
  if(Math.abs(b.P)<0.001) b.P=20;
  b.w = clamp(num(b.w,BEAM_DEFAULT.w),0.5,30);
  b.EI = clamp(num(b.EI,BEAM_DEFAULT.EI),1000,200000);
  ["LLabel","PLabel","aLabel","wLabel","EILabel"].forEach(k=>b[k]=beamCleanLabel(b[k]||""));
  const maxA = b.support==="simple" ? b.L-0.05 : b.L;
  b.a = clamp(num(b.a,b.L/2),0.05,maxA);
  b.items = Array.isArray(b.items) ? b.items.map(it=>beamNormalizeItem(it,b)).filter(Boolean).slice(0,14) : [];
  if(!b.items.length) b.items = beamDefaultItems(b);
  return b;
}
function beamNormalizeItem(it,b){
  const type=BEAM_TOOLS[it?.type] ? it.type : null;
  if(!type) return null;
  const x=clamp(num(it.x,b.L/2),0,b.L), xLabel=beamCleanLabel(it.xLabel||"");
  if(type==="force") return {type,x,xLabel,P:clamp(num(it.P ?? it.value,20),-120,120),PLabel:beamCleanLabel(it.PLabel||"")};
  if(type==="moment") return {type,x,xLabel,M:clamp(num(it.M ?? it.value,20),-300,300),MLabel:beamCleanLabel(it.MLabel||"")};
  return {type,x,xLabel};
}
function beamValLabel(label,value,unit=""){ return label ? label : `${fmt(value,1)}${unit}`; }
function beamXLabel(it){ return it.xLabel || fmt(it.x,1); }
function beamLabelKey(k){ return ({L:"LLabel",P:"PLabel",a:"aLabel",w:"wLabel",EI:"EILabel"})[k] || ""; }
function beamInputValue(b,k,value){
  const lk=beamLabelKey(k);
  return lk && b[lk] ? b[lk] : fmt(value,2);
}
function beamSetSymbol(sid,k,v){ const b=beamState(sid); b[k]=beamCleanLabel(v); beamNormalize(b); save(); render(); }
function beamSetMaybeSymbol(sid,k,v){
  const b=beamState(sid), raw=String(v||"").trim(), lk=beamLabelKey(k);
  const n=Number(raw.replace(/,/g,""));
  if(raw==="" && lk) b[lk]="";
  else if(Number.isFinite(n)){ b[k]=n; if(lk) b[lk]=""; }
  else if(lk) b[lk]=beamCleanLabel(raw);
  beamNormalize(b); save(); render();
}
function beamSetItemSmart(sid,i,k,v){
  const b=beamState(sid), it=b.items[i]; if(!it) return;
  const raw=String(v||"").trim(), n=Number(raw.replace(/,/g,""));
  if(k==="x"){
    if(raw==="") it.xLabel="";
    else if(Number.isFinite(n)){ it.x=n; it.xLabel=""; }
    else it.xLabel=beamCleanLabel(raw);
  }
  if(k==="P"){
    if(raw==="") it.PLabel="";
    else if(Number.isFinite(n)){ it.P=n; it.PLabel=""; }
    else it.PLabel=beamCleanLabel(raw);
  }
  if(k==="M"){
    if(raw==="") it.MLabel="";
    else if(Number.isFinite(n)){ it.M=n; it.MLabel=""; }
    else it.MLabel=beamCleanLabel(raw);
  }
  beamNormalize(b); save(); render();
}
function beamSet(sid,k,v){
  const b=beamState(sid);
  if(k==="support" || k==="load" || k==="mode" || k==="tool") b[k]=v;
  else b[k]=Number(v);
  if(k==="mode" && v==="free" && !b.items.length) b.items=beamDefaultItems(b);
  beamNormalize(b);
  save(); render();
}
function beamSetMode(sid,mode){
  const b=beamState(sid);
  b.mode=mode;
  if(mode==="free") b.items=beamDefaultItems(b);
  beamNormalize(b); save(); render();
}
function beamSetTool(sid,tool){ const b=beamState(sid); b.tool=tool; beamNormalize(b); save(); render(); }
function beamSetItem(sid,i,k,v){
  const b=beamState(sid);
  const it=b.items[i]; if(!it) return;
  if(k==="x") it.x=Number(v);
  if(k==="P") it.P=Number(v);
  if(k==="M") it.M=Number(v);
  if(k==="xLabel") it.xLabel=beamCleanLabel(v);
  if(k==="PLabel") it.PLabel=beamCleanLabel(v);
  if(k==="MLabel") it.MLabel=beamCleanLabel(v);
  beamNormalize(b); save(); render();
}
function beamAddItem(sid,type,x){
  const b=beamState(sid);
  if(b.items.length>=14) return;
  b.items.push(beamItem(type,clamp(num(x,b.L/2),0,b.L)));
  beamNormalize(b); save(); render();
}
function beamRemoveItem(sid,i){ const b=beamState(sid); b.items.splice(i,1); beamNormalize(b); save(); render(); }
function beamPreset(sid,type){
  const b=beamState(sid);
  if(type==="cantilever") b.items=[beamItem("fixed",0), beamItem("force",b.L,{P:20})];
  else b.items=[beamItem("pin",0), beamItem("roller",b.L), beamItem("force",b.L/2,{P:20})];
  b.mode="free"; beamNormalize(b); save(); render();
}
function beamReset(sid){
  const m=meta(); if(!m.beam || typeof m.beam !== "object") m.beam={};
  m.beam[sid]=Object.assign({},BEAM_DEFAULT);
  save(); render();
}
function beamPick(sid,event){
  const b=beamState(sid);
  const rect=event.currentTarget.getBoundingClientRect();
  const xSvg=((event.clientX-rect.left)/rect.width)*760;
  const ratio=clamp((xSvg-70)/640,0,1);
  const at=clamp(ratio*b.L,0,b.L);
  if(b.mode==="free"){ beamAddItem(sid,b.tool,at); return; }
  b.load="point";
  b.a=clamp(at,0.05,b.support==="simple"?b.L-0.05:b.L);
  save(); render();
}
function beamAt(b,x){
  const L=b.L, P=b.P, a=b.a, w=b.w, EI=b.EI;
  let V=0, M=0, y=0;
  if(b.support==="simple" && b.load==="point"){
    const bb=L-a, RA=P*bb/L;
    V = x<a ? RA : RA-P;
    M = x<=a ? RA*x : RA*x-P*(x-a);
    y = x<=a
      ? P*bb*x*(L*L-bb*bb-x*x)/(6*L*EI)
      : P*a*(L-x)*(L*L-a*a-(L-x)*(L-x))/(6*L*EI);
  }else if(b.support==="simple"){
    const RA=w*L/2;
    V = RA-w*x;
    M = RA*x-w*x*x/2;
    y = w*x*(Math.pow(L,3)-2*L*x*x+x*x*x)/(24*EI);
  }else if(b.load==="point"){
    V = x<a ? -P : 0;
    M = x<=a ? -P*(a-x) : 0;
    y = x<=a ? P*x*x*(3*a-x)/(6*EI) : P*a*a*(3*x-a)/(6*EI);
  }else{
    V = -w*(L-x);
    M = -w*Math.pow(L-x,2)/2;
    y = w*x*x*(6*L*L-4*L*x+x*x)/(24*EI);
  }
  return {x,N:0,V,M,Y:y};
}
function beamEventXs(b){
  const xs=new Set([0,b.L]);
  for(let i=0;i<=160;i++) xs.add(Number((b.L*i/160).toFixed(5)));
  (b.items||[]).forEach(it=>{
    const e=Math.max(0.0001,b.L/10000);
    xs.add(Number(clamp(it.x-e,0,b.L).toFixed(5)));
    xs.add(Number(it.x.toFixed(5)));
    xs.add(Number(clamp(it.x+e,0,b.L).toFixed(5)));
  });
  return Array.from(xs).sort((a,b)=>a-b);
}
function beamInterp(xs,vals,x){
  if(x<=xs[0]) return vals[0];
  for(let i=1;i<xs.length;i++){
    if(x<=xs[i]){
      const t=(x-xs[i-1])/(xs[i]-xs[i-1]||1);
      return vals[i-1]+(vals[i]-vals[i-1])*t;
    }
  }
  return vals[vals.length-1];
}
function beamSolveLinear(A,b){
  const n=b.length;
  if(n===0) return [];
  const M=A.map((row,i)=>row.slice().concat([b[i]]));
  for(let col=0; col<n; col++){
    let pivot=col;
    for(let r=col+1;r<n;r++) if(Math.abs(M[r][col])>Math.abs(M[pivot][col])) pivot=r;
    if(Math.abs(M[pivot][col])<1e-9) return null;
    if(pivot!==col){ const tmp=M[col]; M[col]=M[pivot]; M[pivot]=tmp; }
    const div=M[col][col];
    for(let c=col;c<=n;c++) M[col][c]/=div;
    for(let r=0;r<n;r++){
      if(r===col) continue;
      const f=M[r][col];
      for(let c=col;c<=n;c++) M[r][c]-=f*M[col][c];
    }
  }
  return M.map(row=>row[n]);
}
function beamNearestNode(nodes,x){
  let best=0, d=Infinity;
  nodes.forEach((v,i)=>{ const dd=Math.abs(v-x); if(dd<d){ d=dd; best=i; } });
  return best;
}
function beamElementSample(EI,x1,x2,u,x){
  const L=x2-x1, r=L?clamp((x-x1)/L,0,1):0;
  const [v1,t1,v2,t2]=u;
  const N1=1-3*r*r+2*r*r*r, N2=L*(r-2*r*r+r*r*r), N3=3*r*r-2*r*r*r, N4=L*(-r*r+r*r*r);
  const v=N1*v1+N2*t1+N3*v2+N4*t2;

function beamCalc(b){

    <div class="metric"><span class="mini">最大 |M|</span><b>${fmt(c.maxM,2)} kN m</b></div>
    <div class="metric"><span class="mini">最大たわみ</span><b>${fmt(c.yMax*1000,2)} mm</b><span class="mini">x=${fmt(c.yAt.x,2)} m</span></div>
  </div>${c.valid?"" : `<div class="warnbox">${esc(c.note)}</div>`}`;
}
function beamLab(sid){
  if(!sid.startsWith("kozo")) return subject(sid);
  const d=DATA[sid], b=beamState(sid), c=beamCalc(b);
  app.innerHTML=`<div class="topbar"><button class="ghost" onclick="nav('s/${sid}')">←</button>
    <div><b>構造図シミュレータ</b><div class="crumb">${esc(d.name)}</div></div><span class="spacer"></span><button onclick="nav('s/${sid}/sheet')">直前モード</button></div>
    <div class="simgrid">
      <section class="card simcontrols"><b>入力</b>${beamControls(sid)}</section>
      <section class="card">
        <div class="diagram-title"><b>荷重図・反力</b><span class="mini">${b.mode==="free"?"自由配置":`${b.support==="simple"?"単純ばり":"片持ちばり"} / ${b.load==="point"?"集中荷重":"等分布荷重"}`}</span></div>
        <div class="svgpanel">${beamSvg(sid,c)}</div>
        ${beamMetrics(c)}
        <div class="beam-readout"><span class="tag">N図: 0</span><span class="tag">Q図: ${fmt(c.maxV,2)} kN</span><span class="tag">M図: ${fmt(c.maxM,2)} kN m</span></div>
        <div class="beamnote">${b.mode==="free"?"自由配置は剛性法で不静定ばりまで計算します。力は下向き +、集中モーメントは時計回り + です。":"符号は下向き荷重で、片持ちばりの固定端側曲げを負側に描いています。"} たわみは入力した ${esc(b.EILabel||"EI")} による概算です。</div>
      </section>
    </div>
    ${diagramSvg("N図(軸力)",c,"N","kN","var(--c-sub)")}
    ${diagramSvg("Q図(せん断力)",c,"V","kN","#2563eb")}
    ${diagramSvg("M図(曲げモーメント)",c,"M","kN m","#d97706")}
    ${diagramSvg("たわみ概形",c,"Y","m","#16a34a",true)}`;
}


/* --- 用語ポップアップ --- */
function bindGlossary(sid){
  document.querySelectorAll(".gl").forEach(el=>{
    el.onclick=()=>{
      const d=DATA[el.dataset.subj||sid];
      const g=(d.glossary||[]).find(x=>x.term===el.dataset.term);
      showPopup(el.dataset.term, g? md(g.def,sid) : "(用語集に未登録)", g?.reading);
    };
  });
}
function showPopup(title,body,reading){
  const p=document.createElement("div");
  p.className="popup";
  p.innerHTML=`<div class="inner"><h3>${esc(title)} ${reading?`<span class="mini">(${esc(reading)})</span>`:""}</h3><div>${body}</div>
    <div class="rowbtns"><button class="primary">閉じる</button></div></div>`;
  p.onclick=e=>{ if(e.target===p||e.target.tagName==="BUTTON") p.remove(); };
  document.body.appendChild(p);
}

render();
hydrateState().then(()=>initCloudSync());
registerPWA();
window.addEventListener("online",()=>{ initCloudSync(); queueCloudSave(true); });
</script>
